<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 올인원 소통 & 상담 플랫폼</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <!-- 상단 네비게이션 및 모드 전환 바 -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-school"></i> 스마트 교실 허브 (Smart Classroom Hub)
            </h1>
            <div class="flex items-center gap-3 bg-indigo-700 p-1.5 rounded-lg">
                <span class="text-xs text-indigo-200 font-semibold px-2">현재 모드:</span>
                <button onclick="switchMode('teacher')" id="btn-teacher" class="px-3 py-1 text-sm rounded-md font-medium transition bg-white text-indigo-700 shadow">교사 모드</button>
                <button onclick="switchMode('student')" id="btn-student" class="px-3 py-1 text-sm rounded-md font-medium transition text-indigo-100 hover:bg-indigo-600">학생 모드</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">

        <!-- ================= 교사 모드 화면 ================= -->
        <div id="view-teacher" class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-bold text-indigo-900"><i class="fa-solid fa-chalkboard-user mr-2"></i>교사 관리 대시보드</h2>
                    <p class="text-sm text-slate-500">가정통신문 발행, 학생별 비밀 상담 기록 및 확인 현황을 관리합니다.</p>
                </div>
                <div class="text-right">
                    <span class="text-xs bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-semibold">🔒 교사 권한 전용</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 가정통신문 관리 섹션 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3"><i class="fa-solid fa-bullhorn text-indigo-500 mr-2"></i>가정통신문 발행 및 확인 현황</h3>
                    <form id="notice-form" onsubmit="addNotice(event)" class="space-y-3 mb-4">
                        <input type="text" id="notice-title" placeholder="가정통신문 제목 입력" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <textarea id="notice-content" placeholder="상세 내용 입력..." rows="2" required class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">가정통신문 등록하기</button>
                    </form>
                    <div id="teacher-notice-list" class="space-y-3 max-h-60 overflow-y-auto">
                        <!-- 동적 생성 -->
                    </div>
                </div>

                <!-- 비밀 상담 및 학생 메모 섹션 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3"><i class="fa-solid fa-lock text-rose-500 mr-2"></i>학생 비밀 상담 및 메모 (교사 전용)</h3>
                    <div class="space-y-3 mb-4">
                        <input type="text" id="consult-student-name" placeholder="학생 이름 (예: 김철수)" class="w-full px-3 py-2 border rounded-lg text-sm">
                        <textarea id="consult-memo" placeholder="상담 내용 및 특이사항 기록..." rows="2" class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
                        <button onclick="addConsultation()" class="w-full bg-rose-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-rose-700 transition">상담 일지 저장</button>
                    </div>
                    <div id="teacher-consult-list" class="space-y-3 max-h-60 overflow-y-auto">
                        <!-- 동적 생성 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 학생 모드 화면 ================= -->
        <div id="view-student" class="space-y-6 hidden">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-bold text-emerald-900"><i class="fa-solid fa-graduation-cap mr-2"></i>학생 전용 공간</h2>
                    <p class="text-sm text-slate-500">선생님이 올리신 가정통신문을 확인하고 체크하세요. 고민 상담 신청도 가능합니다.</p>
                </div>
                <div>
                    <input type="text" id="current-student-name" placeholder="내 이름 입력" oninput="saveMyName()" class="px-3 py-1.5 border border-emerald-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 font-semibold text-center">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 가정통신문 확인 섹션 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3"><i class="fa-solid fa-envelope-open-text text-emerald-500 mr-2"></i>확인해야 할 가정통신문</h3>
                    <div id="student-notice-list" class="space-y-3 max-h-96 overflow-y-auto">
                        <!-- 동적 생성 -->
                    </div>
                </div>

                <!-- 비밀 상담 신청 섹션 -->
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3"><i class="fa-solid fa-comment-dots text-emerald-500 mr-2"></i>선생님께 비밀 상담 남기기</h3>
                    <p class="text-xs text-slate-500 mb-3">작성하신 내용은 오직 선생님만 볼 수 있습니다. 편하게 적어주세요.</p>
                    <div class="space-y-3">
                        <textarea id="student-private-inquiry" placeholder="고민이나 선생님께 하고 싶은 말을 적어주세요..." rows="4" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                        <button onclick="submitStudentInquiry()" class="w-full bg-emerald-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">선생님께 비공개 전송</button>
                    </div>
                    <div class="mt-4 pt-4 border-t">
                        <h4 class="text-xs font-bold text-slate-500 uppercase mb-2">내가 보낸 비밀 상담 기록</h4>
                        <div id="student-my-inquiries" class="space-y-2 max-h-36 overflow-y-auto text-sm">
                            <!-- 동적 생성 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 자바스크립트 로직 -->
    <script>
        // 데이터 구조 초기화 (localStorage 연동)
        let data = JSON.parse(localStorage.getItem('school_hub_data')) || {
            notices: [], // {id, title, content\, date, checks: [학생이름들]}
            consultations: [] // {id, studentName, memo\, date, isStudentInquiry}
        };

        function saveData() {
            localStorage.setItem('school_hub_data', JSON.stringify(data));
            renderAll();
        }

        // 모드 전환 함수
        function switchMode(mode) {
            const tView = document.getElementById('view-teacher');
            const sView = document.getElementById('view-student');
            const tBtn = document.getElementById('btn-teacher');
            const sBtn = document.getElementById('btn-student');

            if(mode === 'teacher') {
                tView.classList.remove('hidden');
                sView.classList.add('hidden');
                tBtn.className = "px-3 py-1 text-sm rounded-md font-medium transition bg-white text-indigo-700 shadow";
                sBtn.className = "px-3 py-1 text-sm rounded-md font-medium transition text-indigo-100 hover:bg-indigo-600";
            } else {
                tView.classList.add('hidden');
                sView.classList.remove('hidden');
                sBtn.className = "px-3 py-1 text-sm rounded-md font-medium transition bg-white text-emerald-700 shadow";
                tBtn.className = "px-3 py-1 text-sm rounded-md font-medium transition text-indigo-100 hover:bg-indigo-600";
            }
        }

        // 학생 이름 저장
        function saveMyName() {
            const name = document.getElementById('current-student-name').value;
            localStorage.setItem('my_student_name', name);
            renderStudentNotices();
        }

        window.onload = function() {
            const savedName = localStorage.getItem('my_student_name');
            if(savedName) {
                document.getElementById('current-student-name').value = savedName;
            }
            renderAll();
        }

        // 가정통신문 추가 (교사)
        function addNotice(e) {
            e.preventDefault();
            const title = document.getElementById('notice-title').value;
            const content = document.getElementById('notice-content').value;
            
            data.notices.unshift({
                id: Date.now(),
                title,
                content\, date: new Date().toLocaleDateString(),
                checks: [] // 확인한 학생 이름 배열
            });

            document.getElementById('notice-form').reset();
            saveData();
        }

        // 상담 일지 추가 (교사)
        function addConsultation() {
            const studentName = document.getElementById('consult-student-name').value;
            const memo = document.getElementById('consult-memo').value;

            if(!studentName || !memo) {
                alert('학생 이름과 내용을 모두 입력해주세요.');
                return;
            }

            data.consultations.unshift({
                id: Date.now(),
                studentName,
                memo\, date: new Date().toLocaleDateString(),
                isStudentInquiry: false
            });

            document.getElementById('consult-student-name').value = '';
            document.getElementById('consult-memo').value = '';
            saveData();
        }

        // 학생 비공개 상담 신청
        function submitStudentInquiry() {
            const studentName = document.getElementById('current-student-name').value;
            const memo = document.getElementById('student-private-inquiry').value;

            if(!studentName) {
                alert('상단에 본인 이름을 먼저 입력해주세요!');
                return;
            }
            if(!memo) {
                alert('내용을 입력해주세요.');
                return;
            }

            data.consultations.unshift({
                id: Date.now(),
                studentName: studentName + " (학생 신청)",
                memo\, date: new Date().toLocaleDateString(),
                isStudentInquiry: true,
                author: studentName
            });

            document.getElementById('student-private-inquiry').value = '';
            saveData();
            alert('선생님께 비공개로 전달되었습니다.');
        }

        // 가정통신문 확인 체크 토글 (학생)
        function toggleCheckNotice(noticeId) {
            const studentName = document.getElementById('current-student-name').value;
            if(!studentName) {
                alert('상단에 본인 이름을 먼저 입력해야 체크할 수 있습니다!');
                return;
            }

            const notice = data.notices.find(n => n.id === noticeId);
            if(notice) {
                const idx = notice.checks.indexOf(studentName);
                if(idx > -1) {
                    notice.checks.splice(idx, 1); // 체크 해제
                } else {
                    notice.checks.push(studentName); // 체크 완료
                }
                saveData();
            }
        }

        // 화면 렌더링 통합 함수
        function renderAll() {
            renderTeacherNotices();
            renderTeacherConsultations();
            renderStudentNotices();
            renderStudentMyInquiries();
        }

        function renderTeacherNotices() {
            const listEl = document.getElementById('teacher-notice-list');
            if(data.notices.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-400">등록된 가정통신문이 없습니다.</p>`;
                return;
            }
            listEl.innerHTML = data.notices.map(n => `
                <div class="p-3 bg-slate-50 border rounded-lg text-sm space-y-1">
                    <div class="flex justify-between font-bold text-slate-800">
                        <span>${n.title}</span>
                        <span class="text-xs text-slate-400">${n.date}</span>
                    </div>
                    <p class="text-slate-600 text-xs">${n.content}</p>
                    <div class="text-xs text-indigo-600 font-semibold pt-1">
                        확인한 학생 (${n.checks.length}명): ${n.checks.join(', ') || '아직 없음'}
                    </div>
                </div>
            `).join('');
        }

        function renderTeacherConsultations() {
            const listEl = document.getElementById('teacher-consult-list');
            if(data.consultations.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-400">기록된 상담 내용이 없습니다.</p>`;
                return;
            }
            listEl.innerHTML = data.consultations.map(c => `
                <div class="p-3 bg-slate-50 border rounded-lg text-sm space-y-1 ${c.isStudentInquiry ? 'border-rose-300 bg-rose-\frac{50}{30}' : ''}">
                    <div class="flex justify-between font-bold text-slate-800">
                        <span>👤 ${c.studentName}</span>
                        <span class="text-xs text-slate-400">${c.date}</span>
                    </div>
                    <p class="text-slate-700 text-xs">${c.memo}</p>
                </div>
            `).join('');
        }

        function renderStudentNotices() {
            const listEl = document.getElementById('student-notice-list');
            const studentName = document.getElementById('current-student-name').value;

            if(data.notices.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-400">확인할 가정통신문이 없습니다.</p>`;
                return;
            }

            listEl.innerHTML = data.notices.map(n => {
                const isChecked = studentName && n.checks.includes(studentName);
                return `
                    <div class="p-3 border rounded-lg text-sm space-y-2 ${isChecked ? 'bg-emerald-\frac{50}{50} border-emerald-300' : 'bg-white'}">
                        <div class="flex justify-between font-bold text-slate-800">
                            <span>${n.title}</span>
                            <span class="text-xs text-slate-400">${n.date}</span>
                        </div>
                        <p class="text-slate-600 text-xs">${n.content}</p>
                        <div class="flex items-center justify-between pt-2 border-t border-slate-100">
                            <label class="flex items-center gap-2 text-xs font-semibold cursor-pointer text-slate-700">
                                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheckNotice(${n.id})" class="w-4 h-4 text-emerald-600 rounded">
                                확인했습니다 (체크)
                            </label>
                            <span class="text-xs ${isChecked ? 'text-emerald-600 font-bold' : 'text-slate-400'}">
                                ${isChecked ? '✓ 확인 완료됨' : '미확인'}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderStudentMyInquiries() {
            const listEl = document.getElementById('student-my-inquiries');
            const studentName = document.getElementById('current-student-name').value;

            if(!studentName) {
                listEl.innerHTML = `<p class="text-xs text-slate-400">이름을 입력하면 내가 보낸 상담 내역이 표시됩니다.</p>`;
                return;
            }

            const myInquiries = data.consultations.filter(c => c.author === studentName);
            if(myInquiries.length === 0) {
                listEl.innerHTML = `<p class="text-xs text-slate-400">보낸 비공개 상담 내역이 없습니다.</p>`;
                return;
            }

            listEl.innerHTML = myInquiries.map(c => `
                <div class="p-2 bg-slate-50 border rounded text-xs space-y-1">
                    <div class="text-slate-400">${c.date} 전송됨</div>
                    <div class="text-slate-700">${c.memo}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
